services:
  - type: web
    name: blankdeploy
    plan: free
    runtime: node
    region: oregon
    branch: main
    buildCommand: npm install -g pnpm && pnpm install --include=dev && pnpm --filter @workspace/web run build
    startCommand: pnpm --filter @workspace/web run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
